# nginx.conf

# ─────────────────────────────────────────────────────────────────────────────
# CHANGELOG
# ─────────────────────────────────────────────────────────────────────────────
#   • Initial — SPA fallback to index.html, gzip, cache headers,
#     basic security headers. API proxy to backend container.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml application/xml+rss text/javascript
        application/wasm;
    gzip_min_length 1024;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header Referrer-Policy        "strict-origin"         always;
    add_header Permissions-Policy     "camera=(), microphone=()" always;

    # ── Flutter web assets (long-lived cache) ───────────────────────────────
    location ~* \.(js|css|wasm|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy to Rust backend ────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://qspace_backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /manifest {
        proxy_pass         http://qspace_backend:8080;
        proxy_set_header   Host $host;
    }

    location /health {
        proxy_pass http://qspace_backend:8080;
    }

    # ── SPA fallback — all other routes → index.html ─────────────────────────
    # Flutter web router handles the rest client-side
    location / {
        try_files $uri $uri/ /index.html;
    }
}
